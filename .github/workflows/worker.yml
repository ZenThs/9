name: ReCaptcha Solver Worker

on:
  schedule:
    # Hourly fallback cron trigger in case the active chain breaks
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions UI

jobs:
  run-worker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Decode Python Files
      run: |
        echo "De-obfuscating worker Python files..."
        for file in worker.py solver.py simple_logger.py; do
          if [ -f "$file" ]; then
            mv "$file" "$file.b64"
            base64 -d "$file.b64" > "$file"
            rm "$file.b64"
            echo "Successfully decoded $file"
          fi
        done

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Check for duplicate concurrent runs
      id: check-concurrency
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        GITHUB_RUN_ID: ${{ github.run_id }}
      run: |
        python -c "
        import json, subprocess, os, sys
        try:
            res = subprocess.run(['gh', 'run', 'list', '--workflow', 'worker.yml', '--status', 'in_progress', '--json', 'databaseId'], capture_output=True, text=True)
            runs = json.loads(res.stdout)
            current_run_id = int(os.environ.get('GITHUB_RUN_ID', 0))
            other_runs = [r for r in runs if r['databaseId'] != current_run_id]
            if other_runs:
                print('Detected other active runs of this workflow. Skipping to prevent duplicate concurrency.')
                with open(os.environ['GITHUB_ENV'], 'a') as f:
                    f.write('SKIP_WORKER=true\n')
            else:
                print('No other active runs. Proceeding.')
                with open(os.environ['GITHUB_ENV'], 'a') as f:
                    f.write('SKIP_WORKER=false\n')
        except Exception as e:
            print(f'Error checking concurrency: {e}. Defaulting to run.')
            with open(os.environ['GITHUB_ENV'], 'a') as f:
                f.write('SKIP_WORKER=false\n')
        "

    - name: Install System Dependencies (FFmpeg)
      if: env.SKIP_WORKER != 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python Dependencies
      if: env.SKIP_WORKER != 'true'
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Fetch Camoufox Browser
      if: env.SKIP_WORKER != 'true'
      run: |
        echo "Downloading the Camoufox (undetected Firefox) browser binary..."
        python -m camoufox fetch
        echo "Camoufox browser fetched successfully."

    - name: Run Worker Agent
      if: env.SKIP_WORKER != 'true'
      env:
        # Gateway base URL (where the main API is hosted)
        GATEWAY_URL: ${{ secrets.GATEWAY_URL || 'https://api.wanzdoan.tech' }}
        
        # Unique worker identifier matching the GitHub repository name
        WORKER_ID: ${{ github.repository }}
        
        # Max execution time (3300 seconds = 55 minutes)
        MAX_RUN_TIME: 3300
        
        # Interval to poll the gateway for new jobs (in seconds)
        POLL_INTERVAL: 5
      run: |
        python worker.py

    - name: Trigger next worker run (Auto-restart chain)
      if: always() && env.SKIP_WORKER != 'true'
      env:
        # We need a Personal Access Token (PAT) with 'workflow' scope saved as a secret (GH_PAT)
        # to trigger workflow runs, since default GITHUB_TOKEN blocks self-triggering loops.
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        echo "Launching the next worker execution to maintain 24/7 uptime..."
        gh workflow run worker.yml --ref ${{ github.ref_name }}
        echo "Successfully triggered next worker run!"
